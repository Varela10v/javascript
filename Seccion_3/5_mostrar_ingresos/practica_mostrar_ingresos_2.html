<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Ingreso de usuario 2</title>
    </head>
    <body>
        <input type="text" id="inputTexto" value="Luis Miguel">
        <button onclick="mostrarTexto()">Click aqui</button>
        <h1 id="Titulo">mi artista favorito</h1>
        <script>
            function mostrarTexto(){
                let elementNombre = document.getElementById("inputTexto");
                let elementoTitulo = document.getElementById("titulo");
                let mensaje = "mi artista favorito es " elementNombre.value
                elementoTitulo.textContent = mensaje;
            }
        </script>
    </body>
</html>
